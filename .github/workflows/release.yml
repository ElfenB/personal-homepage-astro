# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Release

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# Least-privilege permissions for the workflow
permissions:
  contents: read

# Prevent duplicate runs for the same ref
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          check-latest: true
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: dist
          retention-days: 7

  deploy:
    name: Deploy to FTP
    runs-on: ubuntu-latest
    needs: [build]
    # Only deploy on direct pushes to master (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: dist
      - name: Optional debug listing (only on manual runs)
        if: github.event_name == 'workflow_dispatch'
        run: ls -la dist || true
      - name: Deploy via FTP (SamKirkland)
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist
          server-dir: htdocs/next
          log-level: info
